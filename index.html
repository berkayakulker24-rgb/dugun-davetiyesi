<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilbeste & Berkay | 12.09.2026</title>
    <meta property="og:title" content="Dilbeste & Berkay Save The Date">
    <meta property="og:description" content="12 Eylül 2026 - Mutluluğumuza ortak olmanız dileğiyle...">
    <meta property="og:image" content="https://berkayakulker24-rgb.github.io/dugun-davetiyesi/logo.jpeg">
    <meta property="og:url" content="https://dilbeste-berkay.vercel.app">
    <meta property="og:type" content="website">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@700;800&family=Sacramento&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F6F4EF; /* Temiz krem zemin */
            --line-color: #5C544D; /* Yazı ve çizgi rengi */
            --accent-color: #4A5D23; /* Zarif Zeytin Yeşili Vurgu Rengi */
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: var(--line-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* MOBİL TAŞMA ÇÖZÜMÜ: Yatay scroll'u engeller */
        }

        .invitation-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Kemer yapısı */
        .arch-frame {
            border: 1.5px solid var(--line-color);
            border-bottom: none;
            border-radius: 200px 200px 0 0;
            position: relative;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

      .save-the-date {
            position: absolute;
            rotate: 270deg;
            left: -95px; 
            top: 43%;
            transform: translateY(-50%) rotate(-90deg);
            background-color: var(--bg-color);
            padding: 25px 0; /* Yazının çizgiye değmemesi için dikey boşluk */
            letter-spacing: 6px;
            font-size: 1rem;
            text-transform: lowercase;
            color: var(--line-color);
        }

        .top-section {
            position: relative;
            height: 160px;
            margin-bottom: 20px;
        }

        .left-text {
            position: absolute;
            left: 30px;
            top: 80px;
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.6;
            letter-spacing: 3px;
            font-weight: 600;
        }
        
        .left-text .highlight {
            font-size: 1.3rem;
            font-weight: 800;
            display: block;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* Harf Animasyonu */
        .v-to-g::after {
            content: "V";
            animation: toggleLetter 3s infinite;
            display: inline-block;
            min-width: 18px;
            text-align: center;
        }
        @keyframes toggleLetter { 
            0%, 45% { content: "V"; color: inherit; } 
            55%, 100% { content: "Ğ"; color: var(--accent-color); } 
        }

        .right-date {
            position: absolute;
            right: -30px;
            top: 40px;
            background-color: var(--bg-color);
            padding: 15px 0;
            text-align: right;
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 400;
            line-height: 0.9;
        }

        .mid-date-row {
            border-top: 1px solid #D1C7BD;
            border-bottom: 1px solid #D1C7BD;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
            margin: 20px 0 5px 0;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }
        .mid-date-row span:first-child { text-align: right; }
        .mid-date-row span:last-child { text-align: left; }
        
        .mid-date-row .big-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }

        .center-info {
            text-align: center;
            letter-spacing: 4px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .venue {
            text-align: center;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 400;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .names {
            font-family: 'Sacramento', cursive;
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1;
        }

        /* MOBİL İSİM BOYUTU ÇÖZÜMÜ */
        @media (max-width: 380px) {
            .names {
                font-size: 2.8rem;
            }
        }

        .map-wrapper {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #EAE6DE;
        }
        .map-wrapper iframe {
            width: 100%;
            display: block;
            border: none;
            height: 200px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        /* Buton Etkileşimleri (Hover Efektleri) */
        .btn {
            text-decoration: none;
            width: 90%;
            padding: 16px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-calendar { background-color: var(--line-color); color: var(--bg-color); }
        .btn-calendar:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 93, 35, 0.2);
        }

        .btn-photo { border: 1.5px solid var(--line-color); color: var(--line-color); background: transparent; }
        .btn-photo:hover {
            background-color: var(--line-color);
            color: var(--bg-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(92, 84, 77, 0.2);
        }

        /* Sayaç Nabız Efekti */
        #timer {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 600;
            opacity: 0.6;
        }
        #timer span { 
            font-weight: 800; 
            font-size: 1rem; 
            color: var(--line-color);
            transition: color 0.3s ease;
        }
        
        /* Sayfa Yüklenme (Fade-In) Animasyonları */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-item {
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }
        
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }
        .delay-5 { animation-delay: 1.0s; }

    </style>
</head>
<body>

    <div class="invitation-container">
        <div class="arch-frame">
            
            <div class="save-the-date animate-item">save the date</div>

            <div class="top-section animate-item delay-1">
                <div class="left-text">
                    BU GÜNÜ<br>
                    UNUTMA;<br>
                    <span class="highlight">E<span class="v-to-g"></span>LENİYORUZ</span>
                </div>
                
                <div class="right-date">
                    12<br>09<br>26
                </div>
            </div>

            <div class="mid-date-row animate-item delay-2">
                <span>CUMARTESİ</span>
                <span class="big-number">12</span>
                <span>EYLÜL</span>
            </div>
            
            <div class="center-info animate-item delay-2">2026</div>
            <div class="venue animate-item delay-2">Sophia Çengelköy</div>

            <div class="names animate-item delay-3">
                Dilbeste & Berkay
            </div>

            <div class="map-wrapper animate-item delay-4">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3008.8762889368013!2d29.07423754101704!3d41.04983437146398!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14cac9b0dfddb385%3A0x4184f3b506142660!2zU29waGlhIMOHZW5nZWxrw7Z5!5e0!3m2!1str!2str!4v1773529495595!5m2!1str!2str" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="button-group animate-item delay-5">
                <button onclick="addCalendar()" class="btn btn-calendar">📅 Takvime Ekle</button>
                <a href="https://script.google.com/macros/s/AKfycbx6jHPguURBhvHXUCVfNaXR5UCgYgzzDC_MyVrSEcj8Qfdxla2gwwnthOEp48iA7S4r/exec" target="_blank" class="btn btn-photo">📸 Fotoğraf Yükle</a>
            </div>

            <div id="timer" class="animate-item delay-5">
                <div><span id="d">00</span> GÜN</div>
                <div><span id="h">00</span> SAAT</div>
                <div><span id="m">00</span> DK</div>
            </div>

        </div>
    </div>

    <script>
        function addCalendar() {
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            if (isIOS) {
                const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:Dilbeste & Berkay Düğün\nDTSTART:20260912T190000\nDTEND:20260912T235900\nLOCATION:Sophia Çengelköy\nEND:VEVENT\nEND:VCALENDAR`;
                const blob = new Blob([ics], {type:'text/calendar'});
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = 'dugun.ics';
                link.click();
            } else {
                window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text=Dilbeste+ve+Berkay+Düğün&dates=20260912T160000Z/20260912T210000Z&location=Sophia+Çengelköy", "_blank");
            }
        }

        const target = new Date("Sept 12, 2026 19:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            document.getElementById("d").innerText = days;
            document.getElementById("h").innerText = hours;
            document.getElementById("m").innerText = minutes;
            
        }, 1000);
    </script>
</body>
</html>
